<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c"></canvas>
<script>
const sizes = [16, 32, 48, 128];
sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#0a84ff');
  grad.addColorStop(1, '#5e5ce6');

  // Rounded rect
  const r = size * 0.2;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Search icon
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = size * 0.08;
  ctx.lineCap = 'round';

  const cx = size * 0.42;
  const cy = size * 0.42;
  const cr = size * 0.22;

  ctx.beginPath();
  ctx.arc(cx, cy, cr, 0, Math.PI * 2);
  ctx.stroke();

  // Handle
  const angle = Math.PI / 4;
  ctx.beginPath();
  ctx.moveTo(cx + cr * Math.cos(angle), cy + cr * Math.sin(angle));
  ctx.lineTo(size * 0.78, size * 0.78);
  ctx.stroke();

  // Download
  const link = document.createElement('a');
  link.download = `icon${size}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
});
document.body.innerHTML = '<h1>Icons downloaded! Check your downloads folder.</h1>';
</script>
</body>
</html>
