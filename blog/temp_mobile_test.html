<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6 Categories Mobile Test</title>
<style>
/* ===== CSS Custom Properties ===== */
:root {
  --nao-black: #1d1d1f;
  --nao-dark: #2d2d2f;
  --nao-gray-900: #333336;
  --nao-gray-700: #6e6e73;
  --nao-gray-500: #86868b;
  --nao-gray-300: #d2d2d7;
  --nao-gray-100: #f5f5f7;
  --nao-white: #ffffff;
  --nao-blue: #0071e3;
  --nao-blue-hover: #0077ed;
  --nao-font: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
  --nao-radius: 16px;
  --nao-radius-sm: 12px;
  --nao-shadow: 0 2px 12px rgba(0,0,0,0.06);
  --nao-shadow-hover: 0 8px 30px rgba(0,0,0,0.10);
  --nao-max-w: 1080px;
  --nao-section-py: 72px;
}

body { margin: 0; padding: 0; background: #fff; }

/* ===== Reset & Base ===== */
.nao-home {
  font-family: var(--nao-font);
  color: var(--nao-black);
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
}
.nao-home *, .nao-home *::before, .nao-home *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
.nao-home h1, .nao-home h2, .nao-home h3, .nao-home h4 {
  border: none !important;
  background: none !important;
  padding: 0 !important;
}
.nao-inner {
  max-width: var(--nao-max-w);
  margin: 0 auto;
  padding: 0 24px;
}

/* ===== Section Common ===== */
.nao-section-head {
  text-align: center;
  margin-bottom: 64px;
}
.nao-section-head h2 {
  font-size: 56px !important;
  font-weight: 700 !important;
  letter-spacing: -0.025em !important;
  line-height: 1.07 !important;
  border: none !important;
  background: none !important;
  padding: 0 !important;
  color: #1d1d1f !important;
}

/* ===== Three Themes (6 Categories) ===== */
.nao-themes {
  background: var(--nao-white);
  padding: var(--nao-section-py) 24px;
}
.nao-themes-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  max-width: var(--nao-max-w);
  margin: 0 auto;
}
.nao-theme-card {
  background: var(--nao-gray-100);
  border: none;
  border-radius: 28px;
  padding: 40px 48px 36px;
  text-align: center;
  text-decoration: none;
  color: inherit;
  display: block;
  transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
  overflow: hidden;
}
.nao-theme-card .nao-tc-icon-wrap {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 72px;
  height: 72px;
  background: white;
  border-radius: 18px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
  margin-bottom: 24px;
  position: relative;
  z-index: 1;
}
.nao-theme-card h3 {
  font-size: 28px !important;
  font-weight: 700 !important;
  margin-bottom: 12px !important;
  letter-spacing: -0.3px !important;
  border: none !important;
  background: none !important;
  padding: 0 !important;
  color: #1d1d1f !important;
}
.nao-theme-card p {
  font-size: 15px;
  color: var(--nao-gray-700);
  line-height: 1.65;
}

/* ===== Responsive ===== */
@media (max-width: 734px) {
  :root { --nao-section-py: 48px; }
  .nao-inner { padding: 0 20px; }
  .nao-section-head { margin-bottom: 32px; }
  .nao-section-head h2 { font-size: 28px !important; letter-spacing: -0.04em !important; }

  .nao-themes { padding: 48px 20px; }
  .nao-themes-grid {
    grid-template-columns: 1fr !important;
    gap: 14px !important;
  }
  .nao-theme-card {
    padding: 24px 20px 22px;
    border-radius: 20px;
    display: flex;
    flex-direction: row;
    align-items: center;
    text-align: left;
    gap: 16px;
  }
  .nao-theme-card .nao-tc-icon-wrap {
    width: 52px;
    height: 52px;
    min-width: 52px;
    border-radius: 14px;
    margin-bottom: 0;
  }
  .nao-theme-card .nao-tc-icon-wrap img {
    width: 28px !important;
    height: 28px !important;
  }
  .nao-theme-card .nao-tc-icon-wrap span {
    font-size: 24px !important;
  }
  .nao-theme-card .nao-tc-content {
    flex: 1;
  }
  .nao-theme-card h3 {
    font-size: 16px !important;
    margin-bottom: 4px !important;
  }
  .nao-theme-card p {
    font-size: 12px;
    line-height: 1.5;
  }
  .nao-theme-card p br {
    display: none;
  }
}
</style>
</head>
<body>
<div class="nao-home">
  <section class="nao-themes">
    <div class="nao-inner">
      <div class="nao-section-head">
        <h2>6つのカテゴリーで発信中</h2>
      </div>
      <div class="nao-themes-grid" style="grid-template-columns: repeat(3, 1fr); gap: 20px;">
        <a href="/category/paraguay/" class="nao-theme-card">
          <div class="nao-tc-icon-wrap">
            <img src="https://hatscripts.github.io/circle-flags/flags/py.svg" alt="パラグアイ" style="width:36px;height:36px;">
          </div>
          <div class="nao-tc-content">
            <h3>パラグアイ生活</h3>
            <p>気候・治安・文化・食事<br>在住者だけが知るリアルな日常</p>
          </div>
        </a>
        <a href="/category/ijuu-junbi/" class="nao-theme-card">
          <div class="nao-tc-icon-wrap">
            <span style="font-size: 32px; line-height: 1;">&#x1f4b0;</span>
          </div>
          <div class="nao-tc-content">
            <h3>移住準備・お金</h3>
            <p>ビザ・永住権・海外送金・費用<br>移住前に知りたいお金の全知識</p>
          </div>
        </a>
        <a href="/category/side-business/" class="nao-theme-card">
          <div class="nao-tc-icon-wrap">
            <span style="font-size: 32px; line-height: 1;">&#x1f4bb;</span>
          </div>
          <div class="nao-tc-content">
            <h3>海外で稼ぐ</h3>
            <p>リモートワーク・副業・フリーランス<br>場所に縛られない働き方</p>
          </div>
        </a>
        <a href="/category/kids/" class="nao-theme-card">
          <div class="nao-tc-icon-wrap">
            <span style="font-size: 32px; line-height: 1;">&#x1f467;</span>
          </div>
          <div class="nao-tc-content">
            <h3>子育て・教育</h3>
            <p>インター校・バイリンガル教育<br>海外で子どもを育てるリアル</p>
          </div>
        </a>
        <a href="/category/business/" class="nao-theme-card">
          <div class="nao-tc-icon-wrap">
            <span style="font-size: 32px; line-height: 1;">&#x1f3e2;</span>
          </div>
          <div class="nao-tc-content">
            <h3>起業・ビジネス</h3>
            <p>法人設立・税制・ビジネス環境<br>パラグアイで起業する方法</p>
          </div>
        </a>
        <a href="/category/health/" class="nao-theme-card">
          <div class="nao-tc-icon-wrap">
            <span style="font-size: 32px; line-height: 1;">&#x1fa7a;</span>
          </div>
          <div class="nao-tc-content">
            <h3>健康・医療</h3>
            <p>医療事情・保険・健康管理<br>海外生活の健康を守る知識</p>
          </div>
        </a>
      </div>
    </div>
  </section>
</div>
</body>
</html>
