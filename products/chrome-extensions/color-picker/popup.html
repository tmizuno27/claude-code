<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Picker & Converter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Color Picker</h1>
      <button id="pickBtn" title="Pick color from page">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
          <circle cx="12" cy="12" r="4" fill="currentColor"/>
        </svg>
        Pick Color
      </button>
    </header>

    <!-- Color Preview -->
    <div id="previewSection" class="section">
      <div id="colorPreview" class="color-preview"></div>
      <div id="colorFormats" class="formats">
        <div class="format-row" data-format="hex">
          <span class="format-label">HEX</span>
          <span class="format-value" id="hexValue">-</span>
          <button class="copy-btn" title="Copy">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
        </div>
        <div class="format-row" data-format="rgb">
          <span class="format-label">RGB</span>
          <span class="format-value" id="rgbValue">-</span>
          <button class="copy-btn" title="Copy">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
        </div>
        <div class="format-row" data-format="hsl">
          <span class="format-label">HSL</span>
          <span class="format-value" id="hslValue">-</span>
          <button class="copy-btn" title="Copy">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
        </div>
        <div class="format-row" data-format="cmyk">
          <span class="format-label">CMYK</span>
          <span class="format-value" id="cmykValue">-</span>
          <button class="copy-btn" title="Copy">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Manual Input -->
    <div class="section">
      <div class="input-row">
        <input type="text" id="colorInput" placeholder="Enter color (e.g. #ff5733, rgb(255,87,51))">
        <button id="convertBtn">Convert</button>
      </div>
    </div>

    <!-- Contrast Checker -->
    <div class="section">
      <h2>Contrast Check</h2>
      <div class="contrast-row">
        <div class="contrast-input">
          <label>FG</label>
          <div class="color-chip" id="fgChip"></div>
          <input type="text" id="fgInput" placeholder="#000000" value="#000000">
        </div>
        <div class="contrast-input">
          <label>BG</label>
          <div class="color-chip" id="bgChip"></div>
          <input type="text" id="bgInput" placeholder="#ffffff" value="#ffffff">
        </div>
      </div>
      <button id="checkContrastBtn" class="secondary-btn">Check Contrast</button>
      <div id="contrastResult" class="contrast-result"></div>
    </div>

    <!-- Palette Generator -->
    <div class="section">
      <h2>Palette Generator</h2>
      <div class="palette-type-row">
        <button class="palette-type active" data-type="complementary">Complementary</button>
        <button class="palette-type" data-type="analogous">Analogous</button>
        <button class="palette-type" data-type="triadic">Triadic</button>
        <button class="palette-type" data-type="split">Split-Comp</button>
      </div>
      <div id="generatedPalette" class="palette-chips"></div>
    </div>

    <!-- Saved Palette -->
    <div class="section">
      <h2>Saved Colors <span id="savedCount" class="badge">0/20</span></h2>
      <button id="saveColorBtn" class="secondary-btn">Save Current Color</button>
      <div id="savedPalette" class="palette-chips"></div>
    </div>

    <!-- History -->
    <div class="section">
      <h2>Recent <span id="historyCount" class="badge">0</span></h2>
      <div id="historyPalette" class="palette-chips"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
