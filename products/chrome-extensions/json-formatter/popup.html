<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <h1>{ } JSON Formatter Pro</h1>

    <div class="setting">
      <label>Theme</label>
      <select id="theme">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>
    </div>

    <div class="setting">
      <label>Indent</label>
      <select id="indent">
        <option value="2">2 spaces</option>
        <option value="4">4 spaces</option>
        <option value="tab">Tab</option>
      </select>
    </div>

    <p class="hint">JSON pages are auto-formatted.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
